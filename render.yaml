services:
  # ── FastAPI Backend ──
  - type: web
    name: farmsathi-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: GROQ_API_KEY
        sync: false          # set manually in Render dashboard
      - key: PINECONE_API_KEY
        sync: false
      - key: PINECONE_INDEX
        value: farmsathi-docs-384
      - key: DATA_GOV_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false          # set to your Vercel/Netlify frontend URL
